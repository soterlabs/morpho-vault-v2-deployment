[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 100000
evm_version = "cancun"
remappings = ["capped-oracle-feed/=lib/capped-oracle-feed/src/"]

fs_permissions = [{ access = "read-write", path = "out/migration" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
